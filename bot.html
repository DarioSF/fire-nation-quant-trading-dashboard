<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Quant - Agente</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        /* ESTÉTICA CYBERPUNK 2077 (NEÓN AUTÉNTICO) */
        :root {
            --bg-color: #03060a; 
            --card-bg: #09101a; 
            --text-main: #e0e6ed; 
            --text-muted: #64748b;
            
            /* Colores Base */
            --accent: #ff2a6d; 
            --win: #05ffa1; 
            --loss: #ff2a2a;
            --warn: #fbbf24;

            /* Efectos Neón (Múltiples sombras de luz) */
            --neon-pink: 0 0 5px #ff2a6d, 0 0 15px #ff2a6d, 0 0 30px rgba(255, 42, 109, 0.5);
            --neon-green: 0 0 5px #05ffa1, 0 0 15px #05ffa1, 0 0 30px rgba(5, 255, 161, 0.4);
            --neon-red: 0 0 5px #ff2a2a, 0 0 15px #ff2a2a, 0 0 30px rgba(255, 42, 42, 0.4);
        }

        body { 
            font-family: 'Share Tech Mono', monospace; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            background-image: linear-gradient(rgba(3, 6, 10, 0.9), rgba(3, 6, 10, 0.9)), repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 42, 109, 0.03) 2px, rgba(255, 42, 109, 0.03) 4px); /* Scanlines muy sutiles */
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .cyber-card { 
            background-color: var(--card-bg); 
            border: 1px solid #1a2639; 
            border-radius: 4px; 
            padding: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.5); 
            transition: all 0.3s ease; 
        }
        .cyber-card:hover { 
            border-color: var(--accent); 
            box-shadow: 0 0 10px rgba(255, 42, 109, 0.4), inset 0 0 10px rgba(255, 42, 109, 0.1); 
        }
        
        h1, h2, h3, h4 { 
            font-family: 'Orbitron', sans-serif;
            color: var(--accent); 
            text-shadow: var(--neon-pink); /* Aplicando el brillo real aquí */
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-top: 0;
        }
        
        .btn-back { 
            font-family: 'Orbitron', sans-serif;
            display: inline-block; color: var(--text-main); text-decoration: none; border: 1px solid var(--accent); padding: 8px 20px; border-radius: 4px; margin-bottom: 20px; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 1px; font-size: 0.9em;
            box-shadow: 0 0 5px rgba(255,42,109,0.2);
        }
        .btn-back:hover { 
            background-color: rgba(255,42,109,0.1); 
            color: #fff;
            text-shadow: var(--neon-pink);
            box-shadow: var(--neon-pink);
        }

        .id-grid { display: flex; justify-content: space-around; flex-wrap: wrap; text-align: center; gap: 15px;}
        .id-item span { color: var(--accent); font-size: 0.9em; font-weight: bold; letter-spacing: 1px;}
        .id-item b { display: block; font-family: 'Orbitron', sans-serif; font-size: 1.3em; margin-top: 8px; color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.3);}

        /* FIX DE LA CUADRÍCULA 3x2 PERFECTA */
        .metrics-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* 3 columnas forzadas */
            gap: 20px; 
            margin-bottom: 30px; 
            text-align: center;
        }
        /* Responsividad para móviles */
        @media(max-width: 900px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }
        @media(max-width: 600px) { .metrics-grid { grid-template-columns: 1fr; } }

        .metric-value { 
            font-family: 'Orbitron', sans-serif; /* Números más agresivos */
            font-size: 2.2rem; 
            font-weight: 700; 
            margin-top: 15px; 
            color: #fff;
        }
        .val-win { color: var(--win); text-shadow: var(--neon-green); }
        .val-loss { color: var(--loss); text-shadow: var(--neon-red); }

        .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media(max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-back">&lt; VOLVER AL VAULT</a>
    <header style="text-align: center; margin-bottom: 40px; margin-top: 20px;">
        <h1 id="bot-title" style="font-size: 2.5rem;">CARGANDO AGENTE...</h1>
    </header>

    <div class="cyber-card" style="margin-bottom: 30px;">
        <h3 style="text-align: center; border-bottom: 1px dashed rgba(255,42,109,0.5); padding-bottom: 15px; margin-bottom: 20px;">TARJETA DE IDENTIDAD TÁCTICA</h3>
        <div class="id-grid" id="bot-identity">
            </div>
    </div>

    <div class="metrics-grid">
        <div class="cyber-card">
            <h4>PNL NETO</h4>
            <div class="metric-value" id="bot-pnl">...</div>
        </div>
        <div class="cyber-card">
            <h4>WIN RATE GLOBAL</h4>
            <div class="metric-value" id="bot-winrate">...</div>
        </div>
        <div class="cyber-card">
            <h4></h4>
            <div class="metric-value" id="bot-trades" style="text-shadow: 0 0 10px rgba(255,255,255,0.4);">...</div>
        </div>
        <div class="cyber-card">
            <h4 style="color: var(--warn); text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);">COMISIONES</h4>
            <div class="metric-value" id="bot-fees" style="color: var(--warn); text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);">...</div>
        </div>
        <div class="cyber-card" style="border-color: rgba(5, 255, 161, 0.3); background-color: rgba(5, 255, 161, 0.02); box-shadow: inset 0 0 20px rgba(5,255,161,0.05);">
            <h4 style="color: var(--win); text-shadow: var(--neon-green);">WIN RATE (LONG)</h4>
            <div class="metric-value" id="bot-winrate-long" style="color: var(--win); text-shadow: var(--neon-green);">...</div>
        </div>
        <div class="cyber-card" style="border-color: rgba(255, 42, 109, 0.3); background-color: rgba(255, 42, 109, 0.02); box-shadow: inset 0 0 20px rgba(255,42,109,0.05);">
            <h4 style="color: var(--accent); text-shadow: var(--neon-pink);">WIN RATE (SHORT)</h4>
            <div class="metric-value" id="bot-winrate-short" style="color: var(--accent); text-shadow: var(--neon-pink);">...</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="cyber-card">
            <h4 style="text-align: center;">CURVA DE EQUIDAD AISLADA</h4>
            <div style="height: 300px;"><canvas id="equityChart"></canvas></div>
        </div>
        <div class="cyber-card">
            <h4 style="text-align: center;">TENDENCIA DIRECCIONAL</h4>
            <div style="height: 300px; display: flex; justify-content: center;"><canvas id="donutChart"></canvas></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBrveWMvyuzQRZakH4WghdZ-6iZ_WqIkx8",
        authDomain: "fire-nation-vault.firebaseapp.com",
        projectId: "fire-nation-vault",
        storageBucket: "fire-nation-vault.firebasestorage.app",
        messagingSenderId: "453368759095",
        appId: "1:453368759095:web:8a33648ab6d90d8f9d50b2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const identidades = {
        "Azula": { activo: "BTC/USD", temporalidad: "15m", tp: "1.3x ATR", sl: "1.3x ATR", modo: "Escala Reducida" },
        "Jinora": { activo: "LINK/USD", temporalidad: "15m", tp: "1.3x ATR", sl: "1.3x ATR", modo: "Escala Reducida" },
        "Suki": { activo: "XRP/USD", temporalidad: "15m", tp: "1.5x ATR", sl: "1.5x ATR", modo: "Estándar Institucional" },
        "Kyoshi": { activo: "ADA/USD", temporalidad: "15m", tp: "1.5x ATR", sl: "1.5x ATR", modo: "Estándar Institucional" },
        "Korra": { activo: "AVAX/USD", temporalidad: "15m", tp: "1.5x ATR", sl: "1.5x ATR", modo: "Estándar Institucional" },
        "Ty Lee": { activo: "SOL/USD", temporalidad: "15m", tp: "1.5x ATR", sl: "1.5x ATR", modo: "Estándar Institucional" },
        "Katara": { activo: "ETH/USD", temporalidad: "15m", tp: "1.5x ATR", sl: "1.5x ATR", modo: "Estándar Institucional" },
        "Lin": { activo: "DOT/USD", temporalidad: "15m", tp: "1.5x ATR", sl: "1.5x ATR", modo: "Estándar Institucional" },
        "Zhuli": { activo: "DOGE/USD", temporalidad: "5m", tp: "0.40%", sl: "1.5x ATR", modo: "Spot Sniper (Solo Long)" },
        "Mai": { activo: "NEAR/USD", temporalidad: "1m", tp: "BB (Media)", sl: "BB (Banda Inversa)", modo: "Sandbox HFT (Regreso Media)" }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const botName = urlParams.get('nombre') || 'Desconocido';

    document.getElementById('bot-title').innerText = `TERMINAL AGENTE: ${botName}`;

    const idData = identidades[botName] || { activo: "Auto-detectado", temporalidad: "-", tp: "-", sl: "-", modo: "-" };
    document.getElementById('bot-identity').innerHTML = `
        <div class="id-item"><span>ACTIVO</span><b>${idData.activo}</b></div>
        <div class="id-item"><span>VELAS</span><b>${idData.temporalidad}</b></div>
        <div class="id-item"><span>TAKE PROFIT</span><b>${idData.tp}</b></div>
        <div class="id-item"><span>STOP LOSS</span><b>${idData.sl}</b></div>
        <div class="id-item"><span>ESTRATEGIA</span><b>${idData.modo}</b></div>
    `;

    async function cargarDatosDelBot() {
        try {
            const q = query(collection(db, "operaciones_v2"), where("bot", "==", botName), orderBy("timestamp", "asc"));
            const snapshot = await getDocs(q);

            let pnlTotal = 0, aciertos = 0, totalFees = 0;
            let longs = 0, shorts = 0;
            let longsWon = 0, shortsWon = 0; 
            let equityData = [0], labels = ["Inicio"];

            snapshot.forEach(doc => {
                const data = doc.data();
                pnlTotal += data.pnl_neto || 0;
                totalFees += data.comisiones || 0;
                equityData.push(pnlTotal);
                
                let dateStr = data.timestamp ? data.timestamp.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "N/A";
                labels.push(dateStr);

                if(data.resultado === "WIN") aciertos++;
                
                if(data.tipo === "LONG") {
                    longs++;
                    if(data.resultado === "WIN") longsWon++;
                }
                if(data.tipo === "SHORT") {
                    shorts++;
                    if(data.resultado === "WIN") shortsWon++;
                }
            });

            const totalTrades = snapshot.size;
            
            const winRate = totalTrades > 0 ? ((aciertos / totalTrades) * 100).toFixed(1) : 0;
            const winRateLong = longs > 0 ? ((longsWon / longs) * 100).toFixed(1) : 0;
            const winRateShort = shorts > 0 ? ((shortsWon / shorts) * 100).toFixed(1) : 0;

            document.getElementById('bot-pnl').innerText = pnlTotal >= 0 ? `+$${pnlTotal.toFixed(4)}` : `-$${Math.abs(pnlTotal).toFixed(4)}`;
            document.getElementById('bot-pnl').className = `metric-value ${pnlTotal >= 0 ? 'val-win' : 'val-loss'}`;
            document.getElementById('bot-winrate').innerText = `${winRate}%`;
            document.getElementById('bot-trades').innerText = totalTrades;
            document.getElementById('bot-fees').innerText = `$${totalFees.toFixed(4)}`;
            
            document.getElementById('bot-winrate-long').innerText = longs > 0 ? `${winRateLong}%` : 'N/A';
            document.getElementById('bot-winrate-short').innerText = shorts > 0 ? `${winRateShort}%` : 'N/A';

            dibujarGraficos(labels, equityData, longs, shorts);

        } catch (error) {
            console.error(error);
            document.getElementById('bot-identity').innerHTML = `<div style="color:var(--loss); width:100%;"><b>⚠️ SE REQUIERE ÍNDICE FIRESTORE</b><br>Abre la consola para crear el índice.</div>`;
        }
    }

    function dibujarGraficos(labels, equityData, longs, shorts) {
        // Estilo Global
        Chart.defaults.color = '#8892b0';
        Chart.defaults.font.family = "'Share Tech Mono', monospace";

        // 1. PLUGIN: Resplandor para el Gráfico de Línea
        const neonLineGlowPlugin = {
            id: 'neonLineGlow',
            beforeDatasetsDraw: (chart) => {
                const ctx = chart.ctx;
                ctx.save();
                ctx.shadowColor = '#05ffa1'; // Verde Neón
                ctx.shadowBlur = 12;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
            },
            afterDatasetsDraw: (chart) => {
                chart.ctx.restore();
            }
        };

        // 2. PLUGIN: Resplandor Dinámico para el Gráfico Donut
        const neonDonutGlowPlugin = {
            id: 'neonDonutGlow',
            beforeDatasetsDraw: (chart) => {
                const ctx = chart.ctx;
                chart.data.datasets.forEach((dataset, datasetIndex) => {
                    const meta = chart.getDatasetMeta(datasetIndex);
                    meta.data.forEach((arc, index) => {
                        // Evita errores durante la inicialización de la gráfica
                        if (!arc.x || !arc.y || arc.outerRadius === undefined) return;
                        
                        ctx.save();
                        // Dibuja el trazado geométrico del arco
                        ctx.beginPath();
                        ctx.arc(arc.x, arc.y, arc.outerRadius, arc.startAngle, arc.endAngle);
                        ctx.arc(arc.x, arc.y, arc.innerRadius, arc.endAngle, arc.startAngle, true);
                        ctx.closePath();
                        
                        // Extrae el color de la porción y lo aplica como resplandor
                        const color = dataset.backgroundColor[index];
                        ctx.fillStyle = color;
                        ctx.shadowColor = color;
                        ctx.shadowBlur = 15; // Intensidad del brillo del donut
                        ctx.shadowOffsetX = 0;
                        ctx.shadowOffsetY = 0;
                        
                        // Dibuja la sombra antes de que Chart.js pinte la porción real encima
                        ctx.fill(); 
                        ctx.restore();
                    });
                });
            }
        };

        // Render Gráfico de Línea (Equidad)
        new Chart(document.getElementById('equityChart').getContext('2d'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'PnL Acumulado ($)', 
                    data: equityData,
                    borderColor: '#05ffa1', 
                    backgroundColor: 'transparent',
                    borderWidth: 3, 
                    pointRadius: 0, // Puntos ocultos = tubo continuo
                    pointHoverRadius: 6,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#05ffa1',
                    pointBorderWidth: 2,
                    fill: false, // Sin relleno de fondo
                    tension: 0.3
                }]
            },
            plugins: [neonLineGlowPlugin], // Aplicamos el plugin de línea
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                layout: { padding: { top: 15, bottom: 15 } }, // Espacio para no cortar el brillo
                interaction: { mode: 'index', intersect: false },
                scales: { 
                    x: { grid: { display: false } }, 
                    y: { grid: { color: 'rgba(255, 255, 255, 0.05)' } } 
                }
            }
        });

        // Render Gráfico Donut (Direccionalidad)
        new Chart(document.getElementById('donutChart').getContext('2d'), {
            type: 'doughnut',
            data: {
                labels: ['LONG', 'SHORT'],
                datasets: [{
                    data: [longs, shorts],
                    backgroundColor: ['#05ffa1', '#ff2a6d'],
                    borderColor: '#03060a', // Mismo color del fondo para separar tajadas
                    borderWidth: 3,
                    hoverOffset: 4
                }]
            },
            plugins: [neonDonutGlowPlugin], // Aplicamos el plugin del Donut
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                cutout: '75%', // Lo hacemos más delgado para que parezca un anillo de neón
                layout: { padding: 20 }, // Margen para que el brillo externo no se corte
                plugins: { 
                    legend: { 
                        position: 'bottom', 
                        labels: { color: '#e0e6ed', font: {family: "'Orbitron', sans-serif"} } 
                    } 
                } 
            }
        });
    }

    cargarDatosDelBot();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Nation Vault | Panel Cuantitativo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --win: #10b981;
            --loss: #ef4444;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 1px; color: var(--accent); }
        header p { color: var(--text-muted); margin-top: 5px; }
        
        /* Grid de Métricas */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .metric-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .metric-title { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .metric-value { font-size: 2rem; font-weight: bold; margin-top: 10px; }
        .val-win { color: var(--win); }
        .val-loss { color: var(--loss); }

        /* Gráfico */
        .chart-container {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 40px;
            height: 400px;
        }

        /* Tabla de Operaciones */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
        }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background-color: #0f172a; color: var(--text-muted); font-weight: 600; }
        tr:hover { background-color: #334155; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .badge-long { background-color: rgba(59, 130, 246, 0.2); color: var(--accent); }
        .badge-short { background-color: rgba(168, 85, 247, 0.2); color: #a855f7; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FIRE NATION VAULT</h1>
        <p>Monitorización Cuantitativa de la Flota AWS</p>
    </header>

    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-title">PnL Neto Total</div>
            <div class="metric-value" id="val-pnl">$0.00</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">Tasa de Aciertos (Win Rate)</div>
            <div class="metric-value" id="val-winrate">0%</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">Comisiones Pagadas</div>
            <div class="metric-value" id="val-fees" style="color: #fbbf24;">$0.00</div>
        </div>
        <div class="metric-card">
            <div class="metric-title">Operaciones Totales</div>
            <div class="metric-value" id="val-trades" style="color: var(--text-main);">0</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="equityChart"></canvas>
    </div>

    <div style="overflow-x: auto;">
        <table id="ledgerTable">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Bot</th>
                    <th>Activo</th>
                    <th>Tipo</th>
                    <th>Resultado</th>
                    <th>Comisión</th>
                    <th>PnL Neto</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // Tu configuración inyectada
    const firebaseConfig = {
        apiKey: "AIzaSyBrveWMvyuzQRZakH4WghdZ-6iZ_WqIkx8",
        authDomain: "fire-nation-vault.firebaseapp.com",
        projectId: "fire-nation-vault",
        storageBucket: "fire-nation-vault.firebasestorage.app",
        messagingSenderId: "453368759095",
        appId: "1:453368759095:web:8a33648ab6d90d8f9d50b2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function cargarDatos() {
        try {
            const q = query(collection(db, "operaciones"), orderBy("timestamp", "asc"));
            const querySnapshot = await getDocs(q);
            
            let totalPnl = 0;
            let totalFees = 0;
            let wins = 0;
            let totalTrades = 0;
            
            let chartLabels = ['Inicio'];
            let chartData = [0];
            
            const tbody = document.querySelector('#ledgerTable tbody');
            tbody.innerHTML = ''; // Limpiar cargando...

            // Invertimos para la tabla (los más nuevos arriba) pero leemos en orden para el gráfico
            const operaciones = [];
            querySnapshot.forEach((doc) => {
                operaciones.push(doc.data());
            });

            operaciones.forEach((data) => {
                totalTrades++;
                totalPnl += data.pnl_neto || 0;
                totalFees += data.comisiones || 0;
                if (data.resultado === 'WIN') wins++;

                // Datos para el Gráfico
                let fecha = data.timestamp ? data.timestamp.toDate() : new Date();
                chartLabels.push(fecha.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
                chartData.push(totalPnl);

                // Crear Fila para la tabla
                let fila = `<tr>
                    <td style="color: #94a3b8;">${fecha.toLocaleString()}</td>
                    <td style="font-weight: bold;">${data.bot || 'Desconocido'}</td>
                    <td>${data.asset || 'N/A'}</td>
                    <td><span class="badge ${data.tipo === 'LONG' ? 'badge-long' : 'badge-short'}">${data.tipo}</span></td>
                    <td class="${data.resultado === 'WIN' ? 'val-win' : 'val-loss'} font-bold">${data.resultado}</td>
                    <td style="color: #fbbf24;">$${(data.comisiones || 0).toFixed(4)}</td>
                    <td class="${(data.pnl_neto || 0) >= 0 ? 'val-win' : 'val-loss'}" style="font-weight: bold;">
                        ${(data.pnl_neto || 0) >= 0 ? '+' : ''}$${(data.pnl_neto || 0).toFixed(4)}
                    </td>
                </tr>`;
                tbody.insertAdjacentHTML('afterbegin', fila); // Insertar al principio para ver los últimos primero
            });

            // Actualizar Tarjetas
            document.getElementById('val-pnl').innerText = `${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(4)}`;
            document.getElementById('val-pnl').className = `metric-value ${totalPnl >= 0 ? 'val-win' : 'val-loss'}`;
            
            let winrate = totalTrades > 0 ? ((wins / totalTrades) * 100).toFixed(1) : 0;
            document.getElementById('val-winrate').innerText = `${winrate}%`;
            document.getElementById('val-fees').innerText = `$${totalFees.toFixed(4)}`;
            document.getElementById('val-trades').innerText = totalTrades;

            // Renderizar Gráfico
            renderizarGrafico(chartLabels, chartData);

        } catch (error) {
            console.error("Error cargando los datos de Firestore:", error);
            document.querySelector('#ledgerTable tbody').innerHTML = '<tr><td colspan="7">Aún no hay operaciones registradas o hubo un error al conectar.</td></tr>';
        }
    }

    function renderizarGrafico(labels, data) {
        const ctx = document.getElementById('equityChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Curva de Equidad (USD)',
                    data: data,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    borderWidth: 2,
                    pointRadius: 3,
                    pointBackgroundColor: '#10b981',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                }
            }
        });
    }

    // Arrancar
    cargarDatos();
</script>
</body>
</html>
